name: Deploy RabbitConsumer

on:
  push:
    branches: [main]
    paths:
      - "RabbitConsumer/**" # Triggers ONLY when something in this folder changes

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_OWNER: ${{ github.repository_owner }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./RabbitConsumer
          file: ./RabbitConsumer/Dockerfile # Points directly to this consumer's Dockerfile
          push: true
          tags: ghcr.io/${{ env.IMAGE_OWNER }}/rabbit-consumer:latest
